<DOCTYPE html> 
<html>
  <head>
    <link href="https://fonts.cdnfonts.com/css/jmh-typewriter" rel="stylesheet">
        <style>
            body {
                background-color: #f7f5e9;
                font-family: 'JMH Typewriter', sans-serif;
            }
        </style>
    <title> Spill the Ink</title>
  </head>
  <body>
    <button class="btn btn-outline-light p-2 m-2"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#sidebarNav"
          aria-controls="sidebarNav"
          aria-expanded="true"
          id="sidebarToggle">
    ☰ Menu
    </button>
    <!-- Sidebar -->
    <div class="sidebar collapse show" id="sidebarNav">
        
    </div>
    
    <!-- Main Content -->
    <div class="main-content" id="mainContent">
      <!-- Top Navbar -->
      <div class="top-navbar card text-#f7f5e9 font-'JMH Typewriter' bg-light mb-3">
        <h4 class="m-0 p-2">Home</h4>
      </div>
    <center>
      <h1 text-align: center; text-color: #f7f5e9;>Spill the Ink</h1>
      <h2> GISA Writer's Society</h2>
      <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vSkWmPkrXcPP8d6Qze1oS4Olj5XACdyvhXMfEeQk7_jLUnjzPKSns4yTLNhPBK-zL1JXyF3oe6_C6-h/pubembed?start=true&loop=false&delayms=10000" frameborder="0" width="1440" height="839" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>      </center>
      
      <script>
        const sidebar = document.getElementById('sidebarNav');
        const main   = document.getElementById('mainContent');

        // Listen for the collapse events
        sidebar.addEventListener('shown.bs.collapse', () => {
            sidebar.classList.remove('collapsed');
            main.classList.remove('expanded');
        });
        sidebar.addEventListener('hidden.bs.collapse', () => {
            sidebar.classList.add('collapsed');
            main.classList.add('expanded');
        });
    </script>
  </body>
</html>
